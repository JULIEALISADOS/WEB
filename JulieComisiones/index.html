<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Julie Comisiones - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Pantalla de Login -->
        <section id="login-screen" class="screen">
            <div class="login-container">
                <div class="logo">
                    <h1>JULIE ALISADOS</h1>
                    <p>CALCULADORA DE COMISIONES</p>
                </div>
                <div id="password-login">
                    <input type="email" id="loginEmail" placeholder="Correo electrónico" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; outline:none; font-family:inherit;">
                    <input type="password" id="loginPass" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; outline:none; font-family:inherit;">
                    <button id="btn-verify" class="btn-premium" style="width:100%;">Verificar Administrador</button>
                    <p id="loginError" class="hidden" style="color:#ff4444; font-size:0.9rem; margin-top:10px;">Credenciales incorrectas</p>
                </div>
                <button id="btn-login" class="btn-premium hidden">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="20">
                    Sincronizar Calendario
                </button>
                <p class="security-note">Acceso privado solo para administración</p>
            </div>
        </section>

        <!-- Pantalla Principal (Dashboard) -->
        <section id="main-screen" class="screen hidden">
            <header class="app-header">
                <div class="user-info">
                    <select id="sede-selector" class="sede-select">
                        <option value="tunja">Sede Tunja</option>
                        <option value="moniquira">Sede Moniquirá</option>
                    </select>
                    <button id="btn-logout" class="btn-text">Cerrar Sesión</button>
                </div>
                <nav class="tabs">
                    <button class="tab-btn active" data-tab="resumen">Calculadora</button>
                    <button class="tab-btn" data-tab="reportes">Reportes</button>
                    <button class="tab-btn" data-tab="servicios">Servicios</button>
                </nav>
            </header>

            <main class="content">
                <!-- Tab: Resumen / Calculadora -->
                <div id="tab-resumen" class="tab-content">
                    <div class="view-controls">
                        <button class="view-btn active" data-view="dia">Día</button>
                        <button class="view-btn" data-view="mes">Mes</button>
                        <button class="view-btn" data-view="anio">Año</button>
                    </div>
                    <div class="date-selector">
                        <input type="date" id="date-picker">
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="label">Total Día</span>
                            <span class="value" id="total-dia">$0</span>
                        </div>
                        <div class="stat-card gold">
                            <span class="label">Salón</span>
                            <span class="value" id="total-salon">$0</span>
                        </div>
                    </div>

                    <div class="table-container">
                        <h3>Desglose de Estilistas</h3>
                        <div id="estilistas-list">
                            <!-- Inyectado por JS -->
                            <p class="empty-state">Sincroniza con el calendario para ver datos</p>
                        </div>
                    </div>
                </div>

                <!-- Tab: Servicios -->
                <div id="tab-servicios" class="tab-content hidden">
                    <div class="section-header">
                        <h3>Lista de Precios</h3>
                        <button id="btn-add-service" class="btn-circle">+</button>
                    </div>
                    <div id="services-list" class="list-container">
                        <!-- Inyectado por JS -->
                    </div>
                </div>
            </main>
        </section>
    </div>

    <!-- Modales -->
    <div id="modal-service" class="modal hidden">
        <div class="modal-content">
            <h3>Nuevo Servicio</h3>
            <input type="text" id="service-name" placeholder="Nombre (ej. Alisado)">
            <input type="number" id="service-price" placeholder="Precio de Venta ($)">
            <input type="number" id="service-pay" placeholder="Pago a Estilista ($)">
            <div class="modal-actions">
                <button id="btn-cancel-service" class="btn-secondary">Cancelar</button>
                <button id="btn-save-service" class="btn-premium">Guardar</button>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="app.js"></script>
</body>

</html>
